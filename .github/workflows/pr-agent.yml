# .github/workflows/pr-agent.yml
name: PR Agent

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  pr_agent_job:
    if: >
      github.event.sender.type != 'Bot' &&
      (
        github.event_name == 'issue_comment' ||
        github.event.pull_request.draft == false
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: PR Agent action step
        uses: the-pr-agent/pr-agent@751af2422bef9be99fa605734c058c1c9bc1b3fa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          config.model: "gemini/gemini-2.5-flash"
          config.fallback_models: '["gemini/gemini-2.0-flash"]'

          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "true"

          PR_REVIEWER.REQUIRE_TESTS_REVIEW: "true"
          PR_REVIEWER.REQUIRE_SCORE_REVIEW: "true"
          PR_CODE_SUGGESTIONS.NUM_CODE_SUGGESTIONS: "6"